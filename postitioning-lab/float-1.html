<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 1 - Float</title>
  <style type="text/css">
    html { box-sizing: border-box; }
    *, *:before, *:after { box-sizing: inherit; }

    body {
      background-color: #ECECEC;
      font-weight: bold;
      font-family: Tahoma, Geneva, sans-serif;
      color: #FFF;
      text-align: center;
      line-height: 24px;
    }

    #wrapper {
      background-color: #FFF;
      border: 1px solid #c0c0c0;
      width: 800px;
      margin: 0 auto;
      text-shadow: 2px 2px #000;
      overflow: hidden;
    }

    #navy  { background-color: #001f3f; }
    #teal  { background-color: #39CCCC; }
    #blue  { background-color: #0074D9; }
    #aqua  { background-color: #7FDBFF; }
    #footer { background-color: #666; }

    /* --- Float Layout --- */
    #navy, #teal, #blue, #aqua {
      height: 230px;
      line-height: 230px;
    }

    #navy  { float: left;  width: 45%; }
    #teal  { float: left;  width: 55%; }
    #blue  { float: left;  width: 45%; }
    #aqua  { float: left;  width: 55%; }

    #footer {
      clear: both;
      height: 42px;
      line-height: 42px;
    }
  </style>
</head>
<body>
  <section id="wrapper">
    <div id="navy">Navy</div>
    <div id="teal">Teal</div>
    <div id="blue">Blue</div>
    <div id="aqua">Aqua</div>
    <div id="footer">Footer</div>
  </section>
</body>
</html>
